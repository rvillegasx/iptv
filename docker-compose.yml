services:
  db:
    image: mysql:8.0
    container_name: iptv_mysql_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: iptv_db
      MYSQL_USER: iptv_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
