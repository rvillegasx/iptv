<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #0f172a;
      color: #f8fafc;
    }
    h2 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 16px;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #94a3b8;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f8fafc;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #38bdf8;
    }
    .btn-container {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    button:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background-color: #0284c7;
      color: #ffffff;
    }
    .btn-primary:hover {
      background-color: #0369a1;
    }
    .btn-secondary {
      background-color: #334155;
      color: #f8fafc;
    }
    .btn-secondary:hover {
      background-color: #475569;
    }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
      text-align: center;
    }
    .status-success {
      background-color: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .status-error {
      background-color: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .status-info {
      background-color: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
  </style>
</head>
<body>
  <h2>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #38bdf8;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
    Configuración IPTV FLIX
  </h2>
  
  <div class="form-group">
    <label for="apiUrl">URL de la API del Servidor:</label>
    <input type="text" id="apiUrl" placeholder="Ej: http://localhost:3000 o https://tudominio.com" />
  </div>

  <div class="form-group">
    <label for="apiKey">API Key (X-API-Key):</label>
    <input type="password" id="apiKey" placeholder="Ingresa tu API_KEY" />
  </div>

  <div class="btn-container">
    <button id="btnSave" class="btn-primary">Guardar</button>
    <button id="btnTest" class="btn-secondary">Probar Conexión</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
